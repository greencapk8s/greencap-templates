default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: 5
  host: <%= ENV.fetch("MYSQL_HOST", "mysql") %>
  port: <%= ENV.fetch("MYSQL_PORT", "3306") %>
  username: <%= ENV.fetch("MYSQL_USER", "crud") %>
  password: <%= ENV.fetch("MYSQL_PASSWORD", "crud") %>

production:
  <<: *default
  database: <%= ENV.fetch("MYSQL_DATABASE", "crud") %>
