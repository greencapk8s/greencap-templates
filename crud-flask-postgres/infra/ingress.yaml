apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: crud-flask-postgres
  labels:
    app.kubernetes.io/part-of: crud-flask-postgres
    app.kubernetes.io/component: backend
spec:
  rules:
    - host: crud-flask-postgres.greencap.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
