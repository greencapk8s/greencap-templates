<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CRUD Flask + PostgreSQL</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #ddd; }
    form.inline { display: inline; }
  </style>
</head>
<body>
  <h1>Items</h1>
  <p><a href="{{ url_for('create_item') }}">+ New item</a></p>
  <table>
    <thead>
      <tr><th>ID</th><th>Name</th><th>Description</th><th></th></tr>
    </thead>
    <tbody>
      {% for item in items %}
      <tr>
        <td>{{ item[0] }}</td>
        <td>{{ item[1] }}</td>
        <td>{{ item[2] }}</td>
        <td>
          <a href="{{ url_for('edit_item', item_id=item[0]) }}">Edit</a>
          <form class="inline" method="post" action="{{ url_for('delete_item', item_id=item[0]) }}">
            <button type="submit">Delete</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
