<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ 'Edit' if item else 'New' }} item</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="page">
    <header class="app-header">
      <h1>{{ 'Edit item' if item else 'New item' }}</h1>
    </header>

    <div class="form-card">
      <form method="post">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" value="{{ item[1] if item else '' }}" required>
        </div>
        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" name="description">{{ item[2] if item else '' }}</textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
          <a class="back-link" href="{{ url_for('list_items') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
