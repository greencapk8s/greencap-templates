apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cache-aside-flask-postgres-redis
  labels:
    app.kubernetes.io/part-of: cache-aside-flask-postgres-redis
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/part-of: cache-aside-flask-postgres-redis
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: __BUILD__backend
          envFrom:
            - secretRef:
                name: postgres-credentials
            - secretRef:
                name: redis-credentials
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cache-aside-flask-postgres-redis
  labels:
    app.kubernetes.io/part-of: cache-aside-flask-postgres-redis
    app.kubernetes.io/component: backend
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 5000
