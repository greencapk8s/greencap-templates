apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: crud-flask-mongodb
  labels:
    app.kubernetes.io/part-of: crud-flask-mongodb
    app.kubernetes.io/component: mongodb
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: crud
  MONGO_INITDB_ROOT_PASSWORD: crud
  MONGO_INITDB_DATABASE: crud
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
  namespace: crud-flask-mongodb
  labels:
    app.kubernetes.io/part-of: crud-flask-mongodb
    app.kubernetes.io/component: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: crud-flask-mongodb
  labels:
    app.kubernetes.io/part-of: crud-flask-mongodb
    app.kubernetes.io/component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        app.kubernetes.io/part-of: crud-flask-mongodb
        app.kubernetes.io/component: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:8.0
          envFrom:
            - secretRef:
                name: mongodb-credentials
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongodb-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: crud-flask-mongodb
  labels:
    app.kubernetes.io/part-of: crud-flask-mongodb
    app.kubernetes.io/component: mongodb
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
